<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#carGradient)"/>
  
  <!-- Car body -->
  <path d="M 25 55 L 30 45 L 40 40 L 60 40 L 70 45 L 75 55 L 75 65 L 25 65 Z" 
        fill="white" stroke="white" stroke-width="1"/>
  
  <!-- Car windows -->
  <path d="M 35 45 L 40 42 L 48 42 L 48 45 Z" fill="#10b981" opacity="0.6"/>
  <path d="M 52 45 L 52 42 L 60 42 L 65 45 Z" fill="#10b981" opacity="0.6"/>
  
  <!-- Left wheel -->
  <circle cx="35" cy="65" r="6" fill="#1f2937" stroke="white" stroke-width="1.5"/>
  <circle cx="35" cy="65" r="3" fill="white"/>
  
  <!-- Right wheel -->
  <circle cx="65" cy="65" r="6" fill="#1f2937" stroke="white" stroke-width="1.5"/>
  <circle cx="65" cy="65" r="3" fill="white"/>
  
  <!-- Headlight -->
  <circle cx="73" cy="52" r="2" fill="#fbbf24"/>
</svg>
