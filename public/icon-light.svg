<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="carGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#carGradientLight)"/>
  
  <!-- Car body -->
  <path d="M 8 18 L 10 14 L 13 12 L 19 12 L 22 14 L 24 18 L 24 21 L 8 21 Z" 
        fill="white" stroke="white" stroke-width="0.5"/>
  
  <!-- Car windows -->
  <path d="M 11 14 L 13 13 L 15 13 L 15 14 Z" fill="#10b981" opacity="0.6"/>
  <path d="M 17 14 L 17 13 L 19 13 L 21 14 Z" fill="#10b981" opacity="0.6"/>
  
  <!-- Left wheel -->
  <circle cx="11" cy="21" r="2" fill="#1f2937" stroke="white" stroke-width="0.5"/>
  <circle cx="11" cy="21" r="1" fill="white"/>
  
  <!-- Right wheel -->
  <circle cx="21" cy="21" r="2" fill="#1f2937" stroke="white" stroke-width="0.5"/>
  <circle cx="21" cy="21" r="1" fill="white"/>
  
  <!-- Headlight -->
  <circle cx="23" cy="17" r="0.7" fill="#fbbf24"/>
</svg>
